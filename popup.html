<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ads.txt Line Validator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Ads.txt / App-ads.txt Line Checker</h2>
  <div class="container">
    <div class="settings-bar">
      <div>
        <label>File Type:</label>
        <select id="fileType">
          <option value="app-ads.txt">app-ads.txt</option>
          <option value="ads.txt">ads.txt</option>
        </select>
      </div>
      <div>
        <label>Filter:</label>
        <select id="viewMode">
          <option value="all">Show All Results</option>
          <option value="errors">Errors / Warnings Only</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="col">
        <label>Target Websites</label>
        <textarea id="targetList" placeholder="example.com"></textarea>
      </div>
      <div class="col">
        <label>Reference Lines</label>
        <textarea id="refList" placeholder="google.com, pub-1234, DIRECT"></textarea>
      </div>
    </div>
    <button id="runBtn">Start Validation</button>
    <div class="progress-container" id="progressContainer">
      <div id="progressBar"></div>
    </div>
    <div class="status-bar" id="statusText">Ready</div>
    <div class="table-wrapper">
      <table id="resultsTable">
        <thead>
          <tr>
            <th>Target URL</th>
            <th>Reference</th>
            <th>Result</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <button id="downloadBtn">Download CSV</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
